<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Student Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#b30000,#ff4d4d);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.logo{
    width:140px;
    height:auto;
    display:block;
    margin:0 auto 20px;
}

h2{
    color:#b30000;
    margin-bottom:5px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

input:focus{
    border:2px solid #b30000;
}

button{
    width:100%;
    padding:13px;
    margin-top:15px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#850000;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<p class="subtitle">Student Login Portal</p>

<form onsubmit="return loginDemo()">

<input
type="text"
placeholder="Username"
required>

<input
type="password"
placeholder="Password"
required>

<input
type="text"
placeholder="Department"
required>

<input
type="text"
placeholder="Register Number"
required>

<button type="submit">
LOGIN
</button>

</form>

<div class="footer">
Study • Spirituality • Service
</div>

</div>

<script>

function loginDemo(){

alert("Login Successful!");

return false;

}

</script>

</body>
</html>
